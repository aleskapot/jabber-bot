# XMPP Configuration
xmpp:
  jid: "bot@jabber.skbis.ru"
  password: "7eAuZXdLQq"
  server: "jabber.skbis.ru:5222"
  resource: "bot"
  
# REST API Configuration
api:
  port: 8080
  host: "0.0.0.0"
  api_key: "your-secret-api-key-change-in-production"
  auth_enabled: true
  
# Webhook Configuration
webhook:
  url: "https://example.com/webhook/somepath"
  timeout: 30s
  retry_attempts: 3
  test_mode_suffix: "-test"  # Suffix for webhook URLs when [test] prefix is detected
  api_key: ""  # Optional API key value (Sends as API-Key header if non-empty)
  
# Logging Configuration
logging:
  level: "debug"  # debug, info, warn, error
  output: "stdout"  # stdout, stderr, file
  file_path: ""  # for output=file
  
# Reconnection Configuration
reconnection:
  enabled: true
  max_attempts: 5
  backoff: "5s"

# File Transfer Configuration
file_transfer:
  enabled: true
  max_size: 10485760  # 10 MB in bytes
  storage_path: "./uploads"  # directory to store uploaded files
  base_url: "http://localhost:8080/files"  # public URL base for file access
  retain_days: 7  # days to keep files before cleanup
  use_xep_0363: true  # use HTTP File Upload (XEP-0363) instead of OOB (XEP-0066)
  upload_timeout: 60s  # HTTP upload timeout (XEP-0363)