apiVersion: apps/v1
kind: Deployment
metadata:
  name: jabber-bot
  labels:
    app: jabber-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jabber-bot
  template:
    metadata:
      labels:
        app: jabber-bot
    spec:
      containers:
      - name: jabber-bot
        image: aleskapot/jabber-bot:latest
        ports:
        - containerPort: 8080
          protocol: TCP
        envFrom:
        - configMapRef:
            name: jabber-bot-config
        - secretRef:
            name: jabber-bot-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10